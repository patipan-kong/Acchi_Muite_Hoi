<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vs AI Robot! Look Away!</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>vs AI Robot!<br>Rock-Paper-Scissors &amp; Look Away!</h1>
    </header>

    <main>
      <!-- Webcam + canvas overlay -->
      <div id="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="overlay"></canvas>
        <div id="direction-indicator"></div>
      </div>

      <!-- Game panels -->
      <div id="game-panel">

        <!-- IDLE -->
        <div id="screen-idle" class="screen active">
          <p class="instruction">Show Rock, Paper, or Scissors to the camera!</p>
          <button id="btn-start">Start</button>
        </div>

        <!-- JANKEN_COUNTDOWN -->
        <div id="screen-countdown" class="screen">
          <div id="countdown-display" class="big-text">3</div>
          <p class="instruction">Get your hand ready...</p>
        </div>

        <!-- JANKEN_DETECTION -->
        <div id="screen-detection" class="screen">
          <div id="detection-display" class="big-text">Go!</div>
          <p class="instruction">Show your hand!</p>
          <div id="detected-gesture" class="gesture-display">?</div>
        </div>

        <!-- JANKEN_RESULT -->
        <div id="screen-result" class="screen">
          <div id="result-row">
            <div class="choice-box">
              <div class="label">You</div>
              <div id="player-choice" class="gesture-display">?</div>
            </div>
            <div class="vs-label">VS</div>
            <div class="choice-box">
              <div class="label">AI Robot</div>
              <div id="cpu-choice" class="gesture-display">?</div>
            </div>
          </div>
          <div id="janken-result-text" class="result-text"></div>
        </div>

        <!-- ACCHI_MUITE_HOI -->
        <div id="screen-acchi" class="screen">
          <div id="acchi-instruction" class="big-text"></div>
          <div id="acchi-subtext" class="instruction"></div>
          <div id="acchi-directions" class="directions-row" hidden>
            <div class="direction-box">
              <div class="dir-label" id="acchi-player-label">You</div>
              <div id="acchi-player-arrow" class="dir-arrow">?</div>
            </div>
            <div class="vs-label">VS</div>
            <div class="direction-box">
              <div class="dir-label" id="acchi-robot-label">Robot</div>
              <div id="acchi-robot-arrow" class="dir-arrow">?</div>
            </div>
          </div>
          <div id="acchi-result" class="result-text" hidden></div>
        </div>

        <!-- GAME_OVER -->
        <div id="screen-gameover" class="screen">
          <div id="gameover-text" class="big-text"></div>
          <button id="btn-retry">Play Again</button>
        </div>

      </div>
    </main>

    <div id="score-board">
      <span>You: <span id="score-player">0</span></span>
      <span>AI Robot: <span id="score-cpu">0</span></span>
      <span>Round: <span id="round-count">1</span></span>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
